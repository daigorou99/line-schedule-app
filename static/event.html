<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>スケジュール調整 | 回答・確認</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Noto Sans JP', sans-serif; }
    .status-option input:checked + label.ok-label {
      background-color: #10B981;
      color: white;
      border-color: #10B981;
    }
    .status-option input:checked + label.maybe-label {
      background-color: #F59E0B;
      color: white;
      border-color: #F59E0B;
    }
    .status-option input:checked + label.ng-label {
      background-color: #EF4444;
      color: white;
      border-color: #EF4444;
    }
  </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800 flex flex-col justify-between">

  <!-- Header -->
  <header class="bg-emerald-600 text-white shadow-md">
    <div class="max-w-xl mx-auto px-4 py-4 flex items-center justify-between">
      <a href="/" class="text-xl font-bold flex items-center gap-2 hover:opacity-90 transition">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
        </svg>
        スケジュール調整
      </a>
      <button onclick="copyCurrentUrl()" class="text-xs bg-emerald-700 hover:bg-emerald-800 px-3 py-1.5 rounded-lg font-bold flex items-center gap-1 transition">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"/></svg>
        URLコピー
      </button>
    </div>
  </header>

  <!-- Main Container -->
  <main class="max-w-xl mx-auto w-full px-4 py-6 flex-grow space-y-6">

    <!-- Loading State -->
    <div id="loading-spinner" class="py-12 text-center text-slate-400">
      <div class="inline-block animate-spin rounded-full h-8 w-8 border-4 border-emerald-500 border-t-transparent mb-2"></div>
      <p class="text-sm font-medium">イベント情報を読み込み中...</p>
    </div>

    <!-- Error State -->
    <div id="error-card" class="hidden bg-rose-50 border border-rose-200 text-rose-700 rounded-2xl p-6 text-center">
      <p class="font-bold mb-2 text-lg">エラーが発生しました</p>
      <p id="error-message" class="text-sm">指定されたイベントが存在しないか削除された可能性があります。</p>
      <a href="/" class="inline-block mt-4 text-xs bg-rose-600 text-white font-bold px-4 py-2 rounded-lg">トップに戻る</a>
    </div>

    <!-- Main Event Details Section -->
    <div id="event-content" class="hidden space-y-6">
      
      <!-- Event Header Card -->
      <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-6">
        <div class="flex items-start justify-between">
          <div>
            <h2 id="event-title" class="text-xl font-bold text-slate-800"></h2>
            <p id="event-memo" class="text-sm text-slate-600 mt-2 whitespace-pre-wrap"></p>
          </div>
        </div>
      </div>

      <!-- Schedule Table Card -->
      <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-6">
        
        <!-- Controls: Header & Sort Toggle -->
        <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-3 mb-4 pb-3 border-b border-slate-100">
          <div class="flex items-center gap-2">
            <h3 class="text-md font-bold text-slate-800 flex items-center gap-1.5">
              <svg class="w-5 h-5 text-emerald-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
              出欠状況一覧表
            </h3>
            <span id="response-count" class="text-xs font-bold text-emerald-700 bg-emerald-50 px-2.5 py-1 rounded-full border border-emerald-100">
              回答 0件
            </span>
          </div>

          <!-- 並び替えトグルボタン -->
          <div class="flex items-center bg-slate-100 p-1 rounded-xl text-xs font-bold self-start sm:self-auto">
            <button id="sort-date-btn" onclick="toggleSortMode('date')" class="px-3 py-1.5 rounded-lg transition text-slate-600">
              📅 日付順
            </button>
            <button id="sort-score-btn" onclick="toggleSortMode('score')" class="px-3 py-1.5 rounded-lg transition text-slate-600">
              👑 人気順 (〇の数)
            </button>
          </div>
        </div>

        <div class="overflow-x-auto -mx-6 px-6">
          <table class="w-full text-left text-xs border-collapse min-w-[420px]">
            <thead>
              <tr class="border-b border-slate-200 bg-slate-50 text-slate-500">
                <th class="py-3 px-3 font-bold">候補日時</th>
                <th class="py-3 px-2 text-center font-bold min-w-[65px]">〇/△/×</th>
                <th id="user-headers-container" class="py-3 px-2 font-bold text-slate-600">
                  <!-- JSで動的に回答者の名前ヘッダーを生成 -->
                </th>
                <th class="py-3 px-2 text-center font-bold">カレンダー</th>
              </tr>
            </thead>
            <tbody id="schedule-tbody" class="divide-y divide-slate-100">
              <!-- JSで動的に候補日行を生成 -->
            </tbody>
          </table>
        </div>

        <!-- Comments List -->
        <div id="comments-section" class="mt-6 pt-4 border-t border-slate-100">
          <h4 class="text-xs font-bold text-slate-500 mb-2">メンバーのコメント</h4>
          <div id="comments-list" class="space-y-2 text-xs text-slate-600">
            <!-- コメント表示 -->
          </div>
        </div>
      </div>

      <!-- Response Form Card -->
      <div id="form-card" class="bg-white rounded-2xl shadow-sm border border-slate-100 p-6">
        <h3 class="text-md font-bold text-slate-800 mb-4 pb-2 border-b border-slate-100 flex items-center gap-1.5">
          <svg class="w-5 h-5 text-emerald-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
          あなたの予定を入力
        </h3>

        <form id="response-form" onsubmit="handleRespond(event)" class="space-y-4">
          
          <div class="grid grid-cols-1 sm:grid-cols-3 gap-3">
            <!-- 名前入力 -->
            <div>
              <label for="user-name" class="block text-xs font-bold text-slate-700 mb-1">
                お名前 <span class="text-rose-500">*</span>
              </label>
              <input type="text" id="user-name" required placeholder="例: たなか" onchange="checkExistingName(this.value)"
                class="w-full px-3 py-2 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-emerald-500 text-sm">
            </div>

            <!-- 所属・グループ名 -->
            <div>
              <label for="user-affiliation" class="block text-xs font-bold text-slate-700 mb-1">
                所属・グループ <span class="text-[11px] font-normal text-slate-400">(任意)</span>
              </label>
              <input type="text" id="user-affiliation" placeholder="例: Aチーム"
                class="w-full px-3 py-2 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-emerald-500 text-sm">
            </div>

            <!-- 編集用パスワード -->
            <div>
              <label for="user-pin" class="block text-xs font-bold text-slate-700 mb-1">
                編集用パスワード <span class="text-[11px] font-normal text-slate-400">(任意)</span>
              </label>
              <input type="password" id="user-pin" placeholder="例: 1234" maxlength="10"
                class="w-full px-3 py-2 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-emerald-500 text-sm">
            </div>
          </div>
          <p class="text-[11px] text-slate-400">※パスワードを設定すると後から自分だけで安全に修正・削除ができます</p>

          <!-- 各候補日の可否選択 -->
          <div>
            <label class="block text-xs font-bold text-slate-700 mb-2">
              各候補日の空き状況 <span class="text-rose-500">*</span>
            </label>
            <div id="candidates-form-list" class="space-y-2.5">
              <!-- JSで生成 -->
            </div>
          </div>

          <!-- コメント -->
          <div>
            <label for="user-comment" class="block text-xs font-bold text-slate-700 mb-1">
              コメント <span class="text-[11px] font-normal text-slate-400">(任意)</span>
            </label>
            <input type="text" id="user-comment" placeholder="例: 19時半からなら参加できます！"
              class="w-full px-3 py-2 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-emerald-500 text-sm">
          </div>

          <!-- 送信ボタン -->
          <button type="submit" id="respond-submit-btn"
            class="w-full py-3.5 px-4 bg-emerald-600 hover:bg-emerald-700 active:bg-emerald-800 text-white rounded-xl text-base font-bold shadow-md shadow-emerald-100 transition duration-200 flex items-center justify-center gap-2">
            <span>回答を送信する</span>
          </button>
        </form>
      </div>

    </div>

  </main>

  <!-- Footer -->
  <footer class="py-4 text-center text-xs text-slate-400">
    &copy; Web Schedule App
  </footer>

  <script src="/static/js/app.js"></script>
</body>
</html>
