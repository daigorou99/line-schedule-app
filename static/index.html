<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>イベント作成 | かんたんスケジュール調整</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Noto Sans JP', sans-serif; }
  </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800 flex flex-col justify-between">

  <!-- Header -->
  <header class="bg-emerald-600 text-white shadow-md">
    <div class="max-w-md mx-auto px-4 py-4 flex items-center justify-between">
      <h1 class="text-xl font-bold flex items-center gap-2">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
        </svg>
        スケジュール調整
      </h1>
      <span class="text-xs bg-emerald-700 px-2.5 py-1 rounded-full text-emerald-100">Web版</span>
    </div>
  </header>

  <!-- Main Content -->
  <main class="max-w-md mx-auto w-full px-4 py-6 flex-grow space-y-6">
    
    <!-- Form Card -->
    <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-6">
      <h2 class="text-lg font-bold text-slate-800 mb-4 pb-2 border-b border-slate-100 flex items-center gap-2">
        <span>新規イベント作成</span>
      </h2>

      <form id="create-event-form" onsubmit="handleCreateEvent(event)" class="space-y-5">
        
        <!-- イベント名 -->
        <div>
          <label for="event-title" class="block text-sm font-bold text-slate-700 mb-1">
            イベント名 <span class="text-rose-500">*</span>
          </label>
          <input type="text" id="event-title" required placeholder="例：チーム飲み会、合同ミーティング"
            class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-transparent text-sm transition">
        </div>

        <!-- メモ・概要 -->
        <div>
          <label for="event-memo" class="block text-sm font-bold text-slate-700 mb-1">
            メモ・説明 <span class="text-xs font-normal text-slate-400">(任意)</span>
          </label>
          <textarea id="event-memo" rows="2" placeholder="例：場所は渋谷駅付近。回答期限は今週末までです！"
            class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-transparent text-sm transition"></textarea>
        </div>

        <!-- 候補日時（カレンダー選択） -->
        <div>
          <div class="flex items-center justify-between mb-2">
            <label class="block text-sm font-bold text-slate-700">
              候補日時 <span class="text-rose-500">*</span>
            </label>
            <span class="text-xs text-slate-400">カレンダーで選択</span>
          </div>

          <div id="candidates-container" class="space-y-2 mb-3">
            <div class="candidate-row flex items-center gap-2">
              <input type="datetime-local" required
                class="candidate-input w-full px-3 py-2.5 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-emerald-500 text-sm font-sans">
              <button type="button" onclick="removeCandidateRow(this)" class="p-2 text-slate-400 hover:text-rose-500 transition">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
              </button>
            </div>
            <div class="candidate-row flex items-center gap-2">
              <input type="datetime-local"
                class="candidate-input w-full px-3 py-2.5 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-emerald-500 text-sm font-sans">
              <button type="button" onclick="removeCandidateRow(this)" class="p-2 text-slate-400 hover:text-rose-500 transition">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
              </button>
            </div>
          </div>

          <button type="button" onclick="addCandidateRow()"
            class="w-full py-2.5 px-4 bg-slate-100 hover:bg-slate-200 text-slate-600 rounded-xl text-sm font-bold transition flex items-center justify-center gap-1">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
            候補日時を追加
          </button>
        </div>

        <!-- Submit Button -->
        <button type="submit" id="submit-btn"
          class="w-full py-3.5 px-4 bg-emerald-600 hover:bg-emerald-700 active:bg-emerald-800 text-white rounded-xl text-base font-bold shadow-md shadow-emerald-100 transition duration-200 flex items-center justify-center gap-2">
          <span>URLを発行する</span>
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"/></svg>
        </button>
      </form>
    </div>

    <!-- Generated Result Modal / Card -->
    <div id="result-modal" class="hidden bg-white rounded-2xl shadow-lg border border-emerald-200 p-6 animate-fade-in">
      <div class="flex items-center gap-2 text-emerald-600 font-bold text-lg mb-2">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
        <span>調整URLが発行されました！</span>
      </div>
      <p class="text-xs text-slate-500 mb-4">発行されたURLをグループチャットやメール等で共有してください。</p>

      <div class="mb-4">
        <label class="block text-xs font-bold text-slate-600 mb-1">共有メッセージ例</label>
        <textarea id="share-text" rows="4" readonly
          class="w-full p-3 bg-slate-50 rounded-xl border border-slate-200 text-xs font-mono text-slate-700 resize-none focus:outline-none"></textarea>
      </div>

      <div class="space-y-2">
        <button onclick="copyShareText()"
          class="w-full py-3 px-4 bg-emerald-600 hover:bg-emerald-700 text-white rounded-xl font-bold text-sm shadow flex items-center justify-center gap-2 transition">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"/></svg>
          メッセージをコピー
        </button>
        <a id="go-event-link" href="#"
          class="block text-center w-full py-2.5 px-4 bg-slate-100 hover:bg-slate-200 text-slate-700 rounded-xl font-bold text-sm transition">
          調整ページを開く
        </a>
      </div>
    </div>

    <!-- My Events History Card -->
    <div id="my-events-card" class="bg-white rounded-2xl shadow-sm border border-slate-100 p-6">
      <div class="flex items-center justify-between mb-3">
        <h3 class="text-md font-bold text-slate-800 flex items-center gap-2">
          <svg class="w-5 h-5 text-emerald-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
          作成したイベント履歴
        </h3>
        <span class="text-xs text-slate-400">この端末で作成</span>
      </div>
      <div id="my-events-list" class="space-y-2">
        <p class="text-xs text-slate-400 italic">まだ作成したイベントはありません</p>
      </div>
    </div>

  </main>

  <footer class="py-4 text-center text-xs text-slate-400">
    &copy; Web Schedule App
  </footer>

  <script src="/static/js/app.js"></script>
</body>
</html>
